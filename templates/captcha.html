<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BotDetector - Captcha Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Cyberpunk decorative elements -->
    <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r {{ 'from-cyan-400 to-blue-600' if mode == 'human' else 'from-red-500 to-orange-600' }} shadow-[0_0_15px_currentColor] z-50"></div>

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl relative overflow-hidden">
        
        <!-- Status indicator -->
        <div class="absolute top-0 right-0 p-4">
            <span class="flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full {{ 'bg-cyan-400' if mode == 'human' else 'bg-red-400' }} opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 {{ 'bg-cyan-500' if mode == 'human' else 'bg-red-500' }}"></span>
            </span>
        </div>

        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight mb-2 {{ 'text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500' if mode == 'human' else 'text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-500' }}">
                BotDetector
            </h2>
            <p class="text-sm font-medium tracking-widest uppercase {{ 'text-cyan-600' if mode == 'human' else 'text-red-500' }}">
                {{ 'Human Mode' if mode == 'human' else 'Bot Mode' }}
            </p>
        </div>

        <div class="mb-8 flex justify-center">
            <div class="captcha-container inline-block">
                <img 
                    id="captchaImage" 
                    src="{{ url_for('static', filename='dataset/' + captcha) }}" 
                    alt="Captcha Image"
                    data-filename="{{ captcha }}"
                    class="block rounded select-none pointer-events-none"
                    draggable="false"
                >
            </div>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <input 
                    type="text" 
                    id="captchaInput" 
                    placeholder="Enter Captcha" 
                    class="cyber-input w-full px-5 py-4 rounded-xl text-lg tracking-widest text-center"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
            
            <input 
                type="hidden" 
                id="collectionId" 
                value="{{ collection_id }}"
            >

            <div class="flex gap-4">
                <button 
                    onclick="verifyCaptcha()" 
                    class="flex-grow {{ 'bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 shadow-[0_0_15px_rgba(6,182,212,0.3)]' if mode == 'human' else 'bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 shadow-[0_0_15px_rgba(239,68,68,0.3)]' }} text-white px-4 py-3 rounded-xl font-bold uppercase tracking-wider transition-all duration-300 transform hover:-translate-y-1"
                >
                    Submit Captcha
                </button>
                <button 
                    onclick="skipCaptcha()" 
                    class="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 px-6 py-3 rounded-xl font-semibold uppercase tracking-wider transition-all duration-300"
                >
                    Skip
                </button>
            </div>
        </div>

        <div id="result" class="mt-6 text-center font-bold text-lg tracking-wide min-h-[28px]"></div>

        <div class="mt-6">
            <div class="flex items-center gap-2 mb-2 px-1">
                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Interaction Log</span>
            </div>
            <div 
                id="interactionLog" 
                class="interaction-log p-3 rounded-lg text-sm w-full font-mono"
            ></div>
        </div>
    </div>

    <script>
        let startTime, keyPresses = 0, backspacePresses = 0, mouseMovements = [], attempts = 0;
        const mode = "{{ mode }}";
        const collectionId = document.getElementById('collectionId').value;

        document.addEventListener('DOMContentLoaded', () => {
            startTime = new Date().getTime();
            
            document.getElementById('captchaInput').addEventListener('keydown', (e) => {
                keyPresses++;
                if (e.key === 'Backspace') {
                    backspacePresses++;
                }
            });

            document.addEventListener('mousemove', (e) => {
                mouseMovements.push({x: e.clientX, y: e.clientY});
            });
        });

        function logInteraction(message) {
            const logDiv = document.getElementById('interactionLog');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function resetInteraction() {
            startTime = new Date().getTime();
            keyPresses = 0;
            backspacePresses = 0;
            mouseMovements = [];
            document.getElementById('captchaInput').value = '';
        }

        function skipCaptcha() {
            const captchaImage = document.getElementById('captchaImage');
            const data = {
                collection_id: collectionId,
                mode: mode,
                captcha_image: captchaImage.getAttribute('data-filename'),
                response: 'SKIPPED',
                time_taken: new Date().getTime() - startTime,
                attempts: attempts,
                key_presses: keyPresses,
                backspace_presses: backspacePresses,
                mouse_movements: mouseMovements,
                is_skipped: true
            };

            fetch('/verify', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                logInteraction('Captcha Skipped');
                resetInteraction();
                location.reload();
            })
            .catch(error => {
                console.error('Error:', error);
                logInteraction('Error in skipping');
            });
        }

        function verifyCaptcha() {
            const endTime = new Date().getTime();
            const timeTaken = endTime - startTime;
            const captchaInput = document.getElementById('captchaInput');
            const resultDiv = document.getElementById('result');
            const captchaImage = document.getElementById('captchaImage');

            attempts++;

            const data = {
                collection_id: collectionId,
                mode: mode,
                captcha_image: captchaImage.getAttribute('data-filename'),
                response: captchaInput.value,
                time_taken: timeTaken,
                attempts: attempts,
                key_presses: keyPresses,
                backspace_presses: backspacePresses,
                mouse_movements: mouseMovements
            };

            fetch('/verify', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                resultDiv.innerHTML = result.message;
                logInteraction(`Submission: ${result.message}`);
                
                // Reset for next attempt
                resetInteraction();

                // Optional: Reload captcha or add new captcha logic
                if (result.correct) {
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultDiv.innerHTML = 'An error occurred';
                logInteraction('Error in submission');
            });
        }
    </script>
</body>
</html>
