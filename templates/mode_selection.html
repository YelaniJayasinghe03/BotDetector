<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BotDetector - Mode Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-2xl mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">BotDetector</h1>
            <p class="text-lg text-gray-400 font-light">Collect Data or Test Predictions</p>
        </div>

        {% if error %}
        <div class="bg-red-900 border border-red-500 text-red-200 px-4 py-3 rounded-lg relative mb-6 shadow-[0_0_15px_rgba(239,68,68,0.2)]" role="alert">
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}

        <form action="{{ url_for('start_collection') }}" method="POST" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Human Mode Card -->
                <div class="glass-panel rounded-2xl p-6 text-center mode-card border-2" data-mode="human">
                    <input 
                        type="radio" 
                        id="human-mode" 
                        name="mode" 
                        value="human" 
                        class="hidden" 
                        required
                    >
                    <label for="human-mode" class="cursor-pointer block h-full">
                        <div class="mb-5">
                            <div class="w-20 h-20 mx-auto bg-blue-900 bg-opacity-30 rounded-full flex items-center justify-center border border-cyan-500 border-opacity-30">
                                <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-100 mb-3">Human Mode</h2>
                        <p class="text-sm text-gray-400 mb-4 line-clamp-3">Collect naturalistic interaction data with genuine human patterns</p>
                        <span class="inline-block border border-cyan-500 text-cyan-400 px-3 py-1 rounded-full text-xs bg-cyan-900 bg-opacity-20 uppercase tracking-wider font-semibold">Data Collection</span>
                    </label>
                </div>

                <!-- Bot Mode Card -->
                <div class="glass-panel rounded-2xl p-6 text-center mode-card border-2" data-mode="bot">
                    <input 
                        type="radio" 
                        id="bot-mode" 
                        name="mode" 
                        value="bot" 
                        class="hidden"
                    >
                    <label for="bot-mode" class="cursor-pointer block h-full">
                        <div class="mb-5">
                            <div class="w-20 h-20 mx-auto bg-red-900 bg-opacity-30 rounded-full flex items-center justify-center border border-red-500 border-opacity-30">
                                <svg class="w-10 h-10 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-100 mb-3">Test Mode</h2>
                        <p class="text-sm text-gray-400 mb-4 line-clamp-3">Run your interactions through our model to see if they are predicted as human or bot behavior.</p>
                        <span class="inline-block border border-red-500 text-red-400 px-3 py-1 rounded-full text-xs bg-red-900 bg-opacity-20 uppercase tracking-wider font-semibold">Model Inference</span>
                    </label>
                </div>
            </div>

            <div class="text-center mt-10">
                <button 
                    type="submit" 
                    class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-10 py-4 rounded-xl hover:from-blue-500 hover:to-cyan-500 transition-all duration-300 text-lg font-bold shadow-[0_0_20px_rgba(6,182,212,0.4)] transform hover:scale-105 uppercase tracking-wide"
                >
                    Let's Get Started!
                </button>
            </div>
        </form>
    </div>

    <script>
        const modeCards = document.querySelectorAll('.mode-card');
        modeCards.forEach(card => {
            const radio = card.querySelector('input[type="radio"]');
            card.addEventListener('click', () => {
                modeCards.forEach(c => {
                    c.classList.remove('selected-human', 'selected-bot');
                });
                
                if (card.dataset.mode === 'human') {
                    card.classList.add('selected-human');
                } else {
                    card.classList.add('selected-bot');
                }
                
                radio.checked = true;
            });
        });
    </script>
</body>
</html>
