<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BotDetector - Model Inference</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <!-- Cyberpunk decorative elements -->
    <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-indigo-600 shadow-[0_0_15px_currentColor] z-50"></div>

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl relative overflow-hidden">
      <!-- Status indicator -->
      <div class="absolute top-0 right-0 p-4">
        <span class="flex h-3 w-3">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-purple-500"></span>
        </span>
      </div>

      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500">
          Neural Prediction
        </h2>
        <p class="text-sm font-medium tracking-widest uppercase text-purple-400">
          Live Model Inference
        </p>
      </div>

      <div class="mb-8 flex justify-center">
        <div class="captcha-container inline-block">
          <img
            id="captchaImage"
            src="{{ url_for('static', filename='dataset/' + captcha) }}"
            alt="Captcha Challenge"
            data-filename="{{ captcha }}"
            class="block rounded select-none pointer-events-none"
            draggable="false"
          />
        </div>
      </div>

      <div class="space-y-6">
        <div class="relative">
            <input
              type="text"
              id="captchaInput"
              placeholder="Enter alphanumeric token..."
              class="cyber-input w-full px-5 py-4 rounded-xl text-lg tracking-widest text-center"
              autocomplete="off"
              spellcheck="false"
            />
        </div>
        
        <input type="hidden" id="collectionId" value="{{ collection_id }}" />
        <input type="hidden" id="attempts" value="1" />

        <div class="flex flex-col gap-4">
          <button
            onclick="predictCaptcha()"
            class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 shadow-[0_0_15px_rgba(139,92,246,0.3)] text-white px-4 py-4 rounded-xl font-bold uppercase tracking-wider transition-all duration-300 transform hover:-translate-y-1"
          >
            Run Prediction
          </button>

          <div class="flex justify-center gap-4">
            <button
              onclick="skipCaptcha()"
              id="skipBtn"
              class="w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 px-6 py-3 rounded-xl font-semibold uppercase tracking-wider transition-all duration-300"
            >
              Skip Pattern
            </button>
            <button
              onclick="nextCaptcha()"
              id="nextBtn"
              class="w-full bg-cyan-600 hover:bg-cyan-500 border border-cyan-500 text-white px-6 py-3 rounded-xl font-semibold uppercase tracking-wider transition-all duration-300 hidden"
            >
              Next Challenge
            </button>
          </div>
        </div>
      </div>

      <div
        id="result"
        class="mt-6 text-center font-bold text-xl tracking-wide min-h-[32px] p-2 rounded-lg bg-gray-900 bg-opacity-50"
      ></div>

      <div class="mt-6">
        <div class="flex items-center gap-2 mb-2 px-1">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Inference Logs</span>
        </div>
        <div
          id="interactionLog"
          class="interaction-log p-3 rounded-lg text-sm w-full font-mono"
        ></div>
      </div>
    </div>

    <script>
      let startTime,
        keyPresses = 0,
        backspacePresses = 0,
        mouseMovements = [];

      document.addEventListener("DOMContentLoaded", () => {
        startTime = new Date().getTime();

        document
          .getElementById("captchaInput")
          .addEventListener("keydown", (e) => {
            keyPresses++;
            if (e.key === "Backspace") {
              backspacePresses++;
            }
          });

        document.addEventListener("mousemove", (e) => {
          mouseMovements.push({ x: e.clientX, y: e.clientY });
        });
      });

      function logInteraction(message) {
        const logDiv = document.getElementById("interactionLog");
        const timestamp = new Date().toLocaleTimeString();
        logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function predictCaptcha() {
        const timeTaken = new Date().getTime() - startTime;
        const captchaInput = document.getElementById("captchaInput");
        const resultDiv = document.getElementById("result");
        const captchaImage = document.getElementById("captchaImage");
        const collectionId = document.getElementById("collectionId").value;
        const attemptsInput = document.getElementById("attempts");

        const responseText = captchaInput.value.trim();
        const isCorrect = responseText.length > 0; // Optional: Replace with server-side label checking

        const data = {
          collection_id: collectionId,
          captcha_image: captchaImage.getAttribute("data-filename"),
          response: responseText,
          time_taken: timeTaken,
          key_presses: keyPresses,
          backspace_presses: backspacePresses,
          mouse_movements: mouseMovements,
          is_correct: isCorrect,
          attempts: parseInt(attemptsInput.value)
        };

        fetch("/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(data),
        })
          .then((response) => response.json())
          .then((result) => {
            const prediction = result.bot_prediction || "unknown";
            let message = "";
            resultDiv.classList.remove(
              "text-red-600",
              "text-green-600",
              "text-yellow-500"
            );

            if (prediction === "bot") {
              message = "❌ Bot Detected";
              resultDiv.classList.add("text-red-600");
            } else if (prediction === "human") {
              message = "✅ Human Detected";
              resultDiv.classList.add("text-green-600");
            } else {
              message = "⚠️ Unable to determine";
              resultDiv.classList.add("text-yellow-500");
            }

            resultDiv.innerHTML = message;

            logInteraction(`Prediction: ${prediction}`);
            if (result.mse !== undefined) {
              logInteraction(`MSE: ${result.mse}`);
            }
            if (result.features) {
              logInteraction("Features: " + JSON.stringify(result.features));
            }

            document.getElementById("nextBtn").classList.remove("hidden");
            document.getElementById("skipBtn").classList.add("hidden");
          })
          .catch((error) => {
            console.error("Error:", error);
            resultDiv.innerHTML = "❌ An error occurred";
            resultDiv.classList.add("text-red-600");
            logInteraction("Error in prediction");
          });
      }

      function nextCaptcha() {
        window.location.reload(); // Load new captcha
      }

      function skipCaptcha() {
        logInteraction("Captcha skipped.");
        nextCaptcha();
      }
    </script>
  </body>
</html>
